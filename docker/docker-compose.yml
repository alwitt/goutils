services:

  goutils-redis:
    container_name: goutils-redis
    restart: unless-stopped
    hostname: redis
    image: "redis:8.8-alpine"
    command:
      - redis-server
      - --save 60 1
      - --loglevel warning
    ports:
      - 127.0.0.1:6379:6379
    networks:
      - goutils_dev

networks:
  goutils_dev:
    name: goutils-dev
