image: golang:1.25.5

stages:
  - test

cicd:
  stage: test
  services:
    - name: redis:8.8-alpine
      alias: redis

    - name: rustfs/rustfs:latest
      alias: rustfs
      variables:
        RUSTFS_ADDRESS: 0.0.0.0:9000
        RUSTFS_CONSOLE_ENABLE: "false"
        RUSTFS_ACCESS_KEY: admin
        RUSTFS_SECRET_KEY: password
        RUSTFS_UNSAFE_BYPASS_DISK_CHECK: "true"
        RUSTFS_VOLUMES: /data

  variables:
    UNITTEST_GCP_PROJECT_ID: cicd-389504
    GOOGLE_APPLICATION_CREDENTIALS: .secure_files/gcp-cicd-pubsub-sa-creds.json
    GOOGLE_EXTERNAL_ACCOUNT_ALLOW_EXECUTABLES: "1"
    UNITTEST_OID_ISSUER_URL: https://dev-kry4zc635rswwzkm.us.auth0.com
    UNITTEST_OID_AUDIENCE: http://ut.goutils.hcm.org
    UNITTEST_REDIS_HOST: redis
    UNITTEST_REDIS_PORT: "6379"
    UNITTEST_REDIS_DB: "1"
    UNITTEST_S3_ENDPOINT: rustfs:9000
    AWS_ACCESS_KEY_ID: admin
    AWS_SECRET_ACCESS_KEY: password

  script:
    # Wait for rustfs to be ready before running the S3 tests. GitLab services
    # have no health check, so gate on the rustfs /health endpoint.
    - |
      for i in $(seq 1 30); do
        curl -fsS http://rustfs:9000/health && break
        sleep 1
      done
    - curl --silent "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash
    - go fmt $(go list ./...)
    - go vet $(go list ./...)
    - go test ./...
