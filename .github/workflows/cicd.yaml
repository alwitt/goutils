name: CICD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  revive:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Revive
        uses: morphy2k/revive-action@v2
        with:
          config: revive.toml

  golangci-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7.2
          args: --timeout 3m0s

  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:8.8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rustfs:
        image: rustfs/rustfs:latest
        ports:
          - 9000:9000
        env:
          RUSTFS_ADDRESS: 0.0.0.0:9000
          RUSTFS_CONSOLE_ENABLE: "false"
          RUSTFS_ACCESS_KEY: admin
          RUSTFS_SECRET_KEY: password
          RUSTFS_UNSAFE_BYPASS_DISK_CHECK: "true"
          RUSTFS_VOLUMES: /data
        options: >-
          --health-cmd "curl -fsS http://localhost:9000/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Test
        env:
          UNITTEST_GCP_PROJECT_ID: cicd-389504
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-creds.json
          GOOGLE_APPLICATION_CREDENTIALS_VAL: ${{ secrets.GOOGLEAPPLICATIONCREDENTIALSVAL }}
          UNITTEST_OID_ISSUER_URL: https://dev-kry4zc635rswwzkm.us.auth0.com
          UNITTEST_OID_AUDIENCE: http://ut.goutils.hcm.org
          UNITTEST_OIDP_CLIENT: ${{ secrets.UT_OIDP_CLIENT }}
          UNITTEST_OIDP_CLIENT_CRED: ${{ secrets.UT_OIDP_CLIENT_CRED }}
          UNITTEST_REDIS_HOST: 127.0.0.1
          UNITTEST_REDIS_PORT: "6379"
          UNITTEST_REDIS_DB: "1"
          UNITTEST_S3_ENDPOINT: 127.0.0.1:9000
          AWS_ACCESS_KEY_ID: admin
          AWS_SECRET_ACCESS_KEY: password
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_VAL" > /tmp/gcp-creds.json
          go test --count 1 -v -timeout 600s -short ./...
